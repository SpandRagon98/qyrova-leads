name: Verify and deploy to Cloudflare Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: qyrova-leads-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: ${{ steps.deploy.outputs.deployment-url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Configure production D1 binding
        if: env.CLOUDFLARE_D1_DATABASE_ID != ''
        run: node -e "const fs=require('fs'); const path='wrangler.jsonc'; const config=JSON.parse(fs.readFileSync(path,'utf8')); config.d1_databases[0].database_id=process.env.CLOUDFLARE_D1_DATABASE_ID; fs.writeFileSync(path, JSON.stringify(config, null, 2));"

      - name: Apply D1 schema
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_D1_DATABASE_ID != ''
        run: npx wrangler d1 execute DB --remote --file=migrations/0001_initial.sql --yes

      - name: Deploy Pages application
        id: deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_D1_DATABASE_ID != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'qyrova-leads' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Cloudflare setup notice
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_D1_DATABASE_ID == ''
        run: echo "::notice title=Cloudflare deployment not configured::Add the Cloudflare repository secrets and D1 database ID variable, then rerun this workflow."

      - name: D1 migration notice
        if: env.CLOUDFLARE_D1_DATABASE_ID == ''
        run: echo "::notice title=D1 migration skipped::Add the CLOUDFLARE_D1_DATABASE_ID repository variable after creating the qyrova-leads D1 database."
