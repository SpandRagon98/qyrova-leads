services:
  - type: web
    name: qyrova-leads
    runtime: docker
    plan: free
    autoDeployTrigger: checksPass
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: YELP_API_KEY
        sync: false
      - key: OSM_CONTACT_EMAIL
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
